<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers | Decor My Nest – Studio</title>

<link rel="stylesheet" href="css/style.css">

<style>

.page{
    max-width:1400px;
    margin:auto;
    padding:25px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.header h1{
    font-size:32px;
}

.btn{
    background:#c79b3b;
    color:white;
    border:none;
    padding:12px 22px;
    border-radius:10px;
    cursor:pointer;
}

.search{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:1px solid #ddd;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:15px;
    overflow:hidden;
}

th{
    background:#111827;
    color:white;
    padding:15px;
}

td{
    padding:15px;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#fafafa;
}

.status{
    background:#16a34a;
    color:white;
    padding:5px 12px;
    border-radius:20px;
}

</style>

</head>

<body>

<div class="page">

<div class="header">

<h1>👥 Customer CRM</h1>

<button class="btn" onclick="addCustomer()">
+ Add Customer
</button>

</div>

<input
class="search"
id="search"
placeholder="Search Customer..."
onkeyup="searchCustomer()">

<table id="customerTable">

<thead>

<tr>

<th>Name</th>
<th>Phone</th>
<th>Location</th>
<th>Project</th>
<th>Status</th>

</tr>

</thead>

<tbody id="customerBody">

</tbody>

</table>

</div>

<script>

let customers=[

{
name:"Sample Customer",
phone:"9876543210",
location:"Bangalore",
project:"Interior Painting",
status:"Running"
}

];

function loadCustomers(){

let body=document.getElementById("customerBody");

body.innerHTML="";

customers.forEach(c=>{

body.innerHTML+=`

<tr>

<td>${c.name}</td>

<td>${c.phone}</td>

<td>${c.location}</td>

<td>${c.project}</td>

<td><span class="status">${c.status}</span></td>

</tr>

`;

});

}

loadCustomers();

function addCustomer(){

let name=prompt("Customer Name");

if(!name)return;

let phone=prompt("Phone");

let location=prompt("Location");

let project=prompt("Project");

customers.push({

name,

phone,

location,

project,

status:"New"

});

loadCustomers();

}

function searchCustomer(){

let input=document.getElementById("search").value.toLowerCase();

let rows=document.querySelectorAll("#customerBody tr");

rows.forEach(r=>{

r.style.display=r.innerText.toLowerCase().includes(input)

?""

:"none";

});

}

</script>

</body>
</html>
