<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Studio Decor Contractor Pro</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/app.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="sidebar">

<div class="logo">
🏠 Studio Decor
</div>

<div class="menu">
<button>🏠 Dashboard</button>
<button>👥 Customers</button>
<button>📐 Measurements</button>
<button>🎨 Painting Systems</button>
<button>📝 Quotations</button>
<button>📦 Materials</button>
<button>💰 Payments</button>
<button>📊 Reports</button>
<button>⚙ Settings</button>
</div>

</div>

<div class="main">

<div class="header">

<div class="welcome">
<h1>Welcome, Lohith 👋</h1>
<p id="todayDate"></p>
</div>

</div>

<div class="cards">

<div class="card">
<h3>Active Projects</h3>
<h1 id="projects">12</h1>
</div>

<div class="card">
<h3>Pending Quotes</h3>
<h1 id="quotes">5</h1>
</div>

<div class="card">
<h3>Payments Due</h3>
<h1 id="payments">₹2.35L</h1>
</div>

<div class="card">
<h3>Today's Visits</h3>
<h1 id="visits">3</h1>
</div>

</div>

<div class="quick">

<h2>Quick Actions</h2>

<div class="actions">

<div class="action">
➕<br><br>
New Customer
</div>

<div class="action">
📐<br><br>
New Measurement
</div>

<div class="action">
📝<br><br>
New Quote
</div>

<div class="action">
💰<br><br>
Add Payment
</div>

</div>

</div>

<div style="margin-top:40px">

<h2>Recent Projects</h2>

<div class="card" style="margin-top:20px">

<table width="100%">

<tr>
<th align="left">Customer</th>
<th>Status</th>
<th align="right">Amount</th>
</tr>

<tr>
<td>Demo Project</td>
<td>Running</td>
<td align="right">₹48,500</td>
</tr>

<tr>
<td>Sample Villa</td>
<td>Quotation</td>
<td align="right">₹1,82,000</td>
</tr>

</table>

</div>

</div>

</div>

<div class="bottomNav">

<button>🏠</button>

<button>👥</button>

<button>📐</button>

<button>📝</button>

<button>⚙</button>

</div>

<script src="script.js"></script>

</body>
</html>
