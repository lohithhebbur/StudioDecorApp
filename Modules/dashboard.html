<link rel="stylesheet" href="assets/css/customers.css">
<link rel="stylesheet" href="assets/css/dashboard.css">

<section class="dash">

  <div class="dash-welcome-row">
    <div>
      <h1 id="dashWelcome">Welcome back <span class="dash-wave">👋</span></h1>
      <p class="crm-sub">Here's what's happening with your projects today.</p>
    </div>
    <div class="dash-welcome-actions">
      <button class="crm-btn-primary" id="dashNewProjectButton">+ New Project</button>
      <button class="crm-btn-ghost dash-outline-action" id="dashQuickEstimateButton">Quick Estimate</button>
      <button class="crm-btn-ghost dash-outline-action" id="dashAddProductButton">+ Add Product</button>
    </div>
  </div>

  <div class="dash-stats" id="dashStats"></div>

  <div class="dash-tile-grid" id="dashTileGrid"></div>

  <div class="dash-columns">

    <div class="dash-panel">
      <div class="dash-panel-head">
        <h2>Recent Projects</h2>
        <button class="crm-btn-ghost" data-nav="projects">View All</button>
      </div>
      <div id="dashProjectsList" class="dash-list"></div>
    </div>

    <div class="dash-panel">
      <div class="dash-panel-head">
        <h2>Pending Quotes</h2>
        <button class="crm-btn-ghost" data-nav="quotations">View All</button>
      </div>
      <div id="dashQuotationsList" class="dash-list"></div>
    </div>

  </div>

  <div class="dash-panel">
    <div class="dash-panel-head">
      <h2>Quotation pipeline</h2>
    </div>
    <div id="dashPipeline" class="dash-pipeline"></div>
  </div>

  <div class="dash-footer-bar" id="dashFooterBar"></div>

</section>

<script src="assets/js/dashboard.js"></script>
