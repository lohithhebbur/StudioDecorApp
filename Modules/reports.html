<link rel="stylesheet" href="assets/css/customers.css">
<link rel="stylesheet" href="assets/css/dashboard.css">
<link rel="stylesheet" href="assets/css/project-detail.css">
<link rel="stylesheet" href="assets/css/reports.css">

<section class="dash">

  <div class="dash-welcome-row">
    <div>
      <h1>Reports</h1>
      <p class="crm-sub">A complete picture of your business — quotations, money in, money out.</p>
    </div>
  </div>

  <div class="dash-stats" id="repStats"></div>

  <div class="dash-panel" id="repCustomersPanel">
    <div class="dash-panel-head"><h2>Customers</h2></div>
    <div id="repCustomersList" class="matorder-vendor-summary"></div>
  </div>

  <div class="dash-panel" id="repRevenuePanel">
    <div class="dash-panel-head"><h2>Revenue Won</h2></div>
    <div id="repRevenueList" class="matorder-vendor-summary"></div>
  </div>

  <div class="dash-panel" id="repPipelinePanel">
    <div class="dash-panel-head"><h2>Quotation pipeline</h2></div>
    <div id="repPipeline" class="dash-pipeline"></div>
  </div>

  <div class="dash-columns">
    <div class="dash-panel">
      <div class="dash-panel-head"><h2>Lead sources</h2></div>
      <div id="repLeadSources" class="dash-pipeline"></div>
    </div>
    <div class="dash-panel" id="repCustomerStatusPanel">
      <div class="dash-panel-head"><h2>Customer status</h2></div>
      <div id="repCustomerStatus" class="dash-pipeline"></div>
    </div>
  </div>

  <div class="dash-panel" id="repMaterialPanel">
    <div class="dash-panel-head">
      <h2>Material procurement — all sites</h2>
    </div>
    <div class="pd-matorder-summary" id="repMaterialSummary"></div>
    <div id="repMaterialByVendor" class="matorder-vendor-summary"></div>
    <div id="repMaterialByCategory" class="matorder-vendor-summary"></div>
  </div>

  <div class="dash-panel" id="repLabourPanel">
    <div class="dash-panel-head">
      <h2>Labour — all sites</h2>
    </div>
    <div class="pd-matorder-summary" id="repLabourSummary"></div>
    <div id="repLabourByWorker" class="matorder-vendor-summary"></div>
  </div>

  <div class="dash-panel" id="repInvoicePanel">
    <div class="dash-panel-head">
      <h2>Invoices</h2>
    </div>
    <div class="pd-matorder-summary" id="repInvoiceSummary"></div>
    <div id="repInvoiceList" class="matorder-vendor-summary"></div>
  </div>

  <div class="dash-panel" id="repEstimatesPanel">
    <div class="dash-panel-head">
      <h2>Estimates</h2>
    </div>
    <div id="repEstimatesList" class="matorder-vendor-summary"></div>
  </div>

  <div class="dash-panel" id="repSitesPanel">
    <div class="dash-panel-head">
      <h2>Site-wise summary</h2>
    </div>
    <div id="repSitesList" class="matorder-vendor-summary"></div>
  </div>

  <div id="repStatementOffscreen" style="position:absolute;left:-9999px;top:0;width:800px;background:#fffdf8;"></div>

  <div class="crm-modal hidden" id="repDocModal">
    <div class="crm-modal-box statement-modal-box">
      <div class="crm-modal-head">
        <h2 id="repDocModalTitle">Document</h2>
        <button class="crm-icon-btn" id="closeRepDocModal" aria-label="Close">✕</button>
      </div>
      <div id="repDocContent" class="statement-content"></div>
      <div class="crm-modal-actions">
        <button class="crm-btn-ghost hidden" id="repDocEditButton">✎ Edit</button>
        <div class="crm-modal-actions-right">
          <button class="crm-btn-ghost" id="cancelRepDocModal">Close</button>
          <button class="crm-btn-primary" id="saveRepDocPdf">Save as PDF</button>
        </div>
      </div>
    </div>
  </div>

</section>

<script src="assets/js/reports.js"></script>
