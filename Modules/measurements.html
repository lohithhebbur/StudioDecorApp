<link rel="stylesheet" href="assets/css/customers.css">

<section class="crm">

  <div class="crm-head">
    <div>
      <h1>Measurements</h1>
      <p class="crm-sub" id="measCount">0 customers</p>
    </div>
    <button class="crm-btn-primary" id="btnNewMeasurement">+ New Measurement</button>
  </div>

  <div class="crm-toolbar">
    <div class="crm-search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="searchMeasCustomer" type="text" placeholder="Search by customer name or mobile">
    </div>
  </div>

  <div id="measEmpty" class="crm-empty hidden">
    <p>No customers yet.</p>
    <button class="crm-btn-primary" id="btnNewMeasurementEmpty">+ Start a new measurement</button>
  </div>

  <div class="crm-table-wrap">
    <table class="crm-table" id="measTable">
      <thead>
        <tr>
          <th>Customer</th>
          <th>Contact</th>
          <th>Locality</th>
          <th>Measurement</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="measTableBody"></tbody>
    </table>
  </div>

  <div class="crm-cards" id="measCards"></div>

</section>

<script src="assets/js/measurements-list.js"></script>
